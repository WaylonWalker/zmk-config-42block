# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property.
include:
  - board: nice_nano/nrf52840/zmk
    shield: 42block
    artifact-name: 42block
  - board: nice_nano/nrf52840/zmk
    shield: portajohn
    artifact-name: portajohn
  - board: nice_nano/nrf52840/zmk
    shield: ironhorse
    artifact-name: ironhorse-central
  - board: nice_nano/nrf52840/zmk
    shield: ironhorse_view
    artifact-name: ironhorse-view-peripheral
  # settings_reset must be built without either split shield, per ZMK's reset
  # procedure. Flash the named artifact to the corresponding controller.
  - board: nice_nano/nrf52840/zmk
    shield: settings_reset
    artifact-name: ironhorse-central-reset
  - board: nice_nano/nrf52840/zmk
    shield: settings_reset
    artifact-name: ironhorse-view-peripheral-reset
