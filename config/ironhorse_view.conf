CONFIG_BT_DEVICE_NAME="ironhorse-view"
CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y

# The View is a BLE split peripheral; it does not expose a host keyboard.
CONFIG_ZMK_DISPLAY=y

# Moderate radio power is more reliable than maximum power on clone antennas.
CONFIG_BT_CTLR_TX_PWR_PLUS_4=y

# Favor responsiveness; these intervals are 7.5-15 ms.
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=1024
CONFIG_ZMK_BLE_THREAD_PRIORITY=5

# Power management settings
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Improve connection reliability
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
